<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuakePro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: #06111c;
            color: #c8d4dc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #091824;
            border-bottom: 1px solid #112233;
            flex-shrink: 0;
        }

        .header-left h1 {
            font-size: 1rem;
            font-weight: 600;
            color: #dde8ee;
            letter-spacing: 0.01em;
        }

        .header-left p {
            font-size: 0.72rem;
            color: #3d5566;
            margin-top: 2px;
        }

        .controls {
            display: flex;
            gap: 28px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 0.68rem;
            color: #3d5566;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .slider-row .val {
            font-size: 0.78rem;
            font-weight: 500;
            color: #7faec8;
            min-width: 56px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 3px;
            background: #112233;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4a8faa;
            cursor: pointer;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #map { flex: 1; }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: #091824;
            border-left: 1px solid #112233;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 14px 18px 11px;
            border-bottom: 1px solid #112233;
        }

        .sidebar-header h2 {
            font-size: 0.72rem;
            font-weight: 600;
            color: #5a7a8a;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .sidebar-header p {
            font-size: 0.7rem;
            color: #2a3d4a;
            margin-top: 3px;
        }

        .forecast-list {
            overflow-y: auto;
            flex: 1;
        }

        .forecast-list::-webkit-scrollbar { width: 3px; }
        .forecast-list::-webkit-scrollbar-track { background: transparent; }
        .forecast-list::-webkit-scrollbar-thumb { background: #112233; border-radius: 2px; }

        .forecast-item {
            padding: 9px 18px;
            border-bottom: 1px solid #091520;
            cursor: pointer;
            transition: background 0.12s;
        }

        .forecast-item:hover { background: #0d2030; }
        .forecast-item.active { background: #0f2535; }

        .forecast-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 5px;
        }

        .region-name {
            font-size: 0.8rem;
            color: #b0c4cc;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 210px;
        }

        .prob-value {
            font-size: 0.78rem;
            font-weight: 600;
            flex-shrink: 0;
            margin-left: 8px;
            font-variant-numeric: tabular-nums;
        }

        .prob-bar-bg {
            height: 3px;
            background: #112233;
            border-radius: 2px;
            overflow: hidden;
        }

        .prob-bar {
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .legend {
            padding: 10px 18px;
            border-top: 1px solid #112233;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.68rem;
            color: #3d5566;
        }

        .legend-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .loading {
            padding: 20px 18px;
            font-size: 0.75rem;
            color: #2a3d4a;
        }

        .leaflet-popup-content-wrapper {
            background: #091824;
            border: 1px solid #112233;
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }

        .leaflet-popup-content {
            color: #b0c4cc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            font-size: 0.8rem;
            line-height: 1.5;
            margin: 10px 12px;
        }

        .leaflet-popup-tip { background: #091824; }
        .leaflet-container a.leaflet-popup-close-button { color: #3d5566; }

        .ask-btn {
            background: none;
            border: 1px solid #1e3a4a;
            color: #5a7a8a;
            font-family: inherit;
            font-size: 0.72rem;
            padding: 5px 12px;
            border-radius: 3px;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: border-color 0.15s, color 0.15s;
        }
        .ask-btn:hover { border-color: #4a8faa; color: #7faec8; }

        .chat-panel {
            display: none;
            flex-direction: column;
            border-top: 1px solid #112233;
            height: 240px;
            flex-shrink: 0;
        }
        .chat-panel.open { display: flex; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #112233; border-radius: 2px; }

        .chat-msg {
            font-size: 0.75rem;
            line-height: 1.5;
            max-width: 90%;
        }
        .chat-msg.user { color: #7faec8; align-self: flex-end; text-align: right; }
        .chat-msg.assistant { color: #b0c4cc; align-self: flex-start; }
        .chat-msg.thinking { color: #2a3d4a; font-style: italic; }

        .chat-input-row {
            display: flex;
            border-top: 1px solid #112233;
            flex-shrink: 0;
        }
        .chat-input-row input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 0.75rem;
            color: #b0c4cc;
        }
        .chat-input-row input::placeholder { color: #2a3d4a; }
        .chat-input-row button {
            background: none;
            border: none;
            border-left: 1px solid #112233;
            color: #3d5566;
            font-size: 0.72rem;
            padding: 0 12px;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.15s;
        }
        .chat-input-row button:hover { color: #7faec8; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <h1>QuakePro</h1>
    </div>
    <button class="ask-btn" id="ask-btn">Ask how this works</button>
    <div class="controls">
        <div class="control-group">
            <label>Map filter</label>
            <div class="slider-row">
                <input type="range" id="map-mag-slider" min="1" max="6" step="0.5" value="1">
                <span class="val" id="map-mag-value">M1.0+</span>
            </div>
        </div>
        <div class="control-group">
            <label>Forecast threshold</label>
            <div class="slider-row">
                <input type="range" id="forecast-mag-slider" min="3" max="7" step="0.5" value="5">
                <span class="val" id="forecast-mag-value">M5.0+</span>
            </div>
        </div>
        <div class="control-group">
            <label>Forecast window</label>
            <div class="slider-row">
                <input type="range" id="days-slider" min="7" max="90" step="7" value="30">
                <span class="val" id="days-value">30 days</span>
            </div>
        </div>
    </div>
</header>

<div class="main">
    <div id="map"></div>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Regional Forecast</h2>
            <p id="forecast-subtitle">Probability of M5.0+ in next 30 days</p>
        </div>
        <div class="forecast-list" id="forecast-list">
            <div class="loading">Loading forecasts...</div>
        </div>
        <div class="chat-panel" id="chat-panel">
            <div class="chat-messages" id="chat-messages">
                <div class="chat-msg assistant">Ask me anything about how QuakePro works — the Gutenberg-Richter model, Poisson probabilities, data pipeline, anything.</div>
            </div>
            <div class="chat-input-row">
                <input type="text" id="chat-input" placeholder="How is the forecast calculated?">
                <button id="chat-send">Send</button>
            </div>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#d4c44a"></div>M1–3</div>
            <div class="legend-item"><div class="legend-dot" style="background:#c47a2a"></div>M4–5</div>
            <div class="legend-item"><div class="legend-dot" style="background:#c44a2a"></div>M5–6</div>
            <div class="legend-item"><div class="legend-dot" style="background:#8c1a1a"></div>M6+</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const IS_LOCAL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
    const API = IS_LOCAL ? "http://127.0.0.1:8000" : "https://quake-pro-api.onrender.com";

    const map = L.map("map", { zoomControl: true }).setView([20, 0], 2);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
        attribution: "© OpenStreetMap © CARTO",
        maxZoom: 19
    }).addTo(map);

    function magToRadius(mag) { return Math.max(3, mag * 2.2); }
    function magToColor(mag) {
        if (mag >= 6) return "#8c1a1a";
        if (mag >= 5) return "#c44a2a";
        if (mag >= 4) return "#c47a2a";
        return "#d4c44a";
    }
    function probToColor(prob) {
        if (prob >= 0.85) return "#c44a2a";
        if (prob >= 0.5)  return "#c47a2a";
        if (prob >= 0.2)  return "#7faec8";
        return "#3d7a8a";
    }

    let markers = [];
    let regionCentroids = {};
    let activeItem = null;

    fetch(`${API}/region-centroids`)
        .then(r => r.json())
        .then(data => { regionCentroids = data; });

    function loadEarthquakes(minMag) {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        fetch(`${API}/earthquakes?min_magnitude=${minMag}`)
            .then(r => r.json())
            .then(data => {
                data.forEach(eq => {
                    if (eq.latitude == null || eq.longitude == null) return;
                    const m = L.circleMarker([eq.latitude, eq.longitude], {
                        radius: magToRadius(eq.magnitude),
                        color: magToColor(eq.magnitude),
                        fillColor: magToColor(eq.magnitude),
                        fillOpacity: 0.65,
                        weight: 0.5,
                    }).bindPopup(
                        `<b>M${eq.magnitude ?? "?"}</b>&nbsp;&nbsp;${eq.place}<br>` +
                        `<span style="color:#3d5566">${eq.time?.slice(0,19) ?? ""}</span>`
                    );
                    m.addTo(map);
                    markers.push(m);
                });
            });
    }

    function loadForecasts(threshold, days) {
        const list = document.getElementById("forecast-list");
        document.getElementById("forecast-subtitle").textContent =
            `Probability of M${threshold}+ in next ${days} days`;
        list.innerHTML = '<div class="loading">Loading...</div>';

        fetch(`${API}/forecasts?threshold=${threshold}&days=${days}`)
            .then(r => r.json())
            .then(data => {
                list.innerHTML = "";
                activeItem = null;
                data.forEach(f => {
                    const pct = (f.probability * 100).toFixed(1);
                    const color = probToColor(f.probability);
                    const item = document.createElement("div");
                    item.className = "forecast-item";
                    item.innerHTML = `
                        <div class="forecast-top">
                            <span class="region-name">${f.region}</span>
                            <span class="prob-value" style="color:${color}">${pct}%</span>
                        </div>
                        <div class="prob-bar-bg">
                            <div class="prob-bar" style="width:${pct}%;background:${color}"></div>
                        </div>
                    `;
                    item.addEventListener("click", () => {
                        if (activeItem) activeItem.classList.remove("active");
                        item.classList.add("active");
                        activeItem = item;
                        const c = regionCentroids[f.region];
                        if (c) map.flyTo([c.lat, c.lng], 5, { duration: 1.2 });
                    });
                    list.appendChild(item);
                });
            });
    }

    const mapMagSlider = document.getElementById("map-mag-slider");
    const forecastMagSlider = document.getElementById("forecast-mag-slider");
    const daysSlider = document.getElementById("days-slider");

    mapMagSlider.addEventListener("input", () => {
        document.getElementById("map-mag-value").textContent = `M${mapMagSlider.value}+`;
        loadEarthquakes(mapMagSlider.value);
    });

    let debounce;
    function updateForecast() {
        clearTimeout(debounce);
        debounce = setTimeout(() => loadForecasts(forecastMagSlider.value, daysSlider.value), 400);
    }

    forecastMagSlider.addEventListener("input", () => {
        document.getElementById("forecast-mag-value").textContent = `M${forecastMagSlider.value}+`;
        updateForecast();
    });

    daysSlider.addEventListener("input", () => {
        document.getElementById("days-value").textContent = `${daysSlider.value} days`;
        updateForecast();
    });

    loadEarthquakes(1.0);
    loadForecasts(5.0, 30);

    const askBtn = document.getElementById("ask-btn");
    const chatPanel = document.getElementById("chat-panel");
    const chatMessages = document.getElementById("chat-messages");
    const chatInput = document.getElementById("chat-input");

    askBtn.addEventListener("click", () => {
        chatPanel.classList.toggle("open");
        if (chatPanel.classList.contains("open")) chatInput.focus();
    });

    async function sendChat() {
        const text = chatInput.value.trim();
        if (!text) return;
        chatInput.value = "";

        const userMsg = document.createElement("div");
        userMsg.className = "chat-msg user";
        userMsg.textContent = text;
        chatMessages.appendChild(userMsg);

        const thinking = document.createElement("div");
        thinking.className = "chat-msg thinking";
        thinking.textContent = "Thinking...";
        chatMessages.appendChild(thinking);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            const res = await fetch(`${API}/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text }),
            });
            thinking.className = "chat-msg assistant";
            thinking.textContent = "";
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                thinking.textContent += decoder.decode(value, { stream: true });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        } catch {
            thinking.className = "chat-msg assistant";
            thinking.textContent = "Error reaching the server.";
        }
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    document.getElementById("chat-send").addEventListener("click", sendChat);
    chatInput.addEventListener("keydown", e => { if (e.key === "Enter") sendChat(); });
</script>
</body>
</html>
